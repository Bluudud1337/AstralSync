<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astral Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #05070d;
    color: #00bfff;
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    border-bottom: 1px solid #00bfff33;
}

.title {
    font-size: 22px;
    margin-bottom: 10px;
}

/* NAV BUTTONS */
.nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap; /* makes them stack */
}

.nav button {
    padding: 8px 14px;
    border: 1px solid #00bfff44;
    background: #0a0f1a;
    color: #00bfff;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.nav button:hover {
    border-color: #00bfff;
    box-shadow: 0 0 8px #00bfff66;
}

/* SEARCH */
.search-box {
    display: flex;
    justify-content: center;
    padding: 15px;
}

.search-box input {
    width: 300px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #0a0f1a;
    color: #00bfff;
    border: 1px solid #00bfff44;
}

/* GRID */
.tools {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* TOOL CARD */
.tool {
    background: #0a0f1a;
    border: 1px solid #00bfff22;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    transition: 0.2s;
}

.tool:hover {
    border-color: #00bfff;
    box-shadow: 0 0 10px #00bfff55;
    transform: translateY(-3px);
}

/* ICON */
.icon {
    font-size: 28px;
    margin-bottom: 10px;
}

/* BUTTON */
.tool button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

.tool button:hover {
    background: #0099ff;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">ASTRAL TOOLS</div>

    <div class="nav">
        <button onclick="goTo('index.html')">Home</button>
        <button onclick="goTo('apps.html')">Apps</button>
        <button onclick="goTo('movies.html')">Movies</button>
        <button onclick="goTo('BlankLauncher.html')">Blank launcher</button>
        <button onclick="goTo('ProxyLinks.html')">Proxy Links</button>
    </div>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search tools..." onkeyup="filterTools()">
</div>

<div class="tools" id="toolsList">

    <div class="tool" data-name="calculator math">
        <div class="icon">🌐</div>
        <div>Firefox</div>
        <button onclick="openTool('https://drive.google.com/file/d/1fPyILsgd_D8QUm29-Krrzw-FrqOXeMvU/view')">Open</button>
    </div>
</div>
<div>
<p>more coming soon!</p>
    



</div>

<script>
function openTool(url) {
    window.open(url, "_blank");
}

function goTo(page) {
    window.location.href = page;
}

function filterTools() {
    let input = document.getElementById("search").value.toLowerCase();
    let tools = document.querySelectorAll(".tool");

    tools.forEach(tool => {
        let name = tool.getAttribute("data-name");
        tool.style.display = name.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>

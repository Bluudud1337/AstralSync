<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>AstralChat | Void Network</title>  
    <style>  
        :root {  
            --black: #020205;  
            --dark-bg: #080812;  
            --accent-blue: #00d4ff;  
            --deep-blue: #004aab;  
            --text-gray: #a0a0c0;  
            --glass: rgba(255, 255, 255, 0.05);  
            --glow: 0 0 15px rgba(0, 212, 255, 0.4);  
        }

        body, html {  
            margin: 0;  
            padding: 0;  
            width: 100%;  
            height: 100%;  
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;  
            background-color: var(--black);  
            color: white;  
            overflow: hidden;  
        }

        /* GLOBAL NAVBAR */  
        nav {  
            height: 60px;  
            background: var(--dark-bg);  
            display: flex;  
            justify-content: space-between;  
            align-items: center;  
            padding: 0 30px;  
            border-bottom: 1px solid var(--deep-blue);  
            box-sizing: border-box;  
            z-index: 1000;  
            position: relative;  
        }

        .logo {  
            font-size: 22px;  
            font-weight: 800;  
            color: var(--accent-blue);  
            text-transform: uppercase;  
            letter-spacing: 3px;  
            text-shadow: var(--glow);  
        }

        .games-btn {  
            background: transparent;  
            color: var(--accent-blue);  
            border: 1px solid var(--accent-blue);  
            padding: 8px 20px;  
            text-decoration: none;  
            font-size: 13px;  
            font-weight: bold;  
            border-radius: 4px;  
            transition: 0.3s;  
            text-transform: uppercase;  
        }

        .games-btn:hover {  
            background: var(--accent-blue);  
            color: var(--black);  
            box-shadow: var(--glow);  
        }

        /* AUTH SCREEN */  
        #auth-overlay {  
            position: fixed;  
            inset: 0;  
            background: radial-gradient(circle at center, #0a0a20 0%, #020205 100%);  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            z-index: 9999;  
        }

        .auth-card {  
            background: var(--dark-bg);  
            padding: 40px;  
            border-radius: 20px;  
            border: 1px solid var(--deep-blue);  
            width: 350px;  
            text-align: center;  
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), var(--glow);  
        }

        .auth-card h2 {  
            margin-top: 0;  
            font-size: 28px;  
            color: var(--accent-blue);  
            margin-bottom: 25px;  
        }

        .auth-card input {  
            width: 100%;  
            padding: 12px;  
            margin: 10px 0;  
            background: var(--black);  
            border: 1px solid var(--deep-blue);  
            color: white;  
            border-radius: 8px;  
            box-sizing: border-box;  
            outline: none;  
        }

        .auth-card input:focus {  
            border-color: var(--accent-blue);  
            box-shadow: 0 0 5px var(--accent-blue);  
        }

        .auth-card button {  
            width: 100%;  
            padding: 12px;  
            margin-top: 20px;  
            background: var(--accent-blue);  
            border: none;  
            color: var(--black);  
            font-weight: bold;  
            border-radius: 8px;  
            cursor: pointer;  
            font-size: 16px;  
            transition: 0.3s;  
        }

        .auth-card button:hover {  
            filter: brightness(1.2);  
            transform: translateY(-2px);  
        }

        /* MAIN LAYOUT */  
        #main-app {  
            display: none; /* Hidden until login */  
            height: calc(100vh - 60px);  
            display: grid;  
            grid-template-columns: 260px 1fr;  
        }

        /* SIDEBAR */  
        .sidebar {  
            background: var(--dark-bg);  
            border-right: 1px solid var(--deep-blue);  
            display: flex;  
            flex-direction: column;  
            padding: 20px;  
        }

        .user-profile {  
            display: flex;  
            align-items: center;  
            gap: 12px;  
            padding: 15px;  
            background: var(--glass);  
            border-radius: 12px;  
            margin-bottom: 20px;  
        }

        .user-avatar {  
            width: 40px;  
            height: 40px;  
            background: var(--accent-blue);  
            border-radius: 50%;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            color: var(--black);  
            font-weight: bold;  
        }

        .user-info span {  
            display: block;  
            font-size: 14px;  
            font-weight: bold;  
        }

        .user-info small {  
            color: var(--text-gray);  
            font-size: 11px;  
        }

        /* CHAT AREA */  
        .chat-area {  
            display: flex;  
            flex-direction: column;  
            background: var(--black);  
            position: relative;  
        }

        #message-list {  
            flex: 1;  
            overflow-y: auto;  
            padding: 30px;  
            display: flex;  
            flex-direction: column;  
            gap: 15px;  
        }

        .message {  
            max-width: 60%;  
            padding: 12px 16px;  
            border-radius: 15px;  
            font-size: 14px;  
            line-height: 1.4;  
            animation: slideIn 0.2s ease-out;  
        }

        @keyframes slideIn {  
            from { opacity: 0; transform: translateX(-10px); }  
            to { opacity: 1; transform: translateX(0); }  
        }

        .msg-received {  
            background: var(--glass);  
            align-self: flex-start;  
            border-bottom-left-radius: 2px;  
            border: 1px solid var(--deep-blue);  
        }

        .msg-sent {  
            background: var(--deep-blue);  
            align-self: flex-end;  
            border-bottom-right-radius: 2px;  
            box-shadow: var(--glow);  
        }

        .msg-user {  
            display: block;  
            font-size: 11px;  
            font-weight: bold;  
            color: var(--accent-blue);  
            margin-bottom: 4px;  
        }

        /* INPUT BOX */  
        .input-box {  
            padding: 25px;  
            background: var(--dark-bg);  
            display: flex;  
            gap: 15px;  
            border-top: 1px solid var(--deep-blue);  
        }

        .input-box input {  
            flex: 1;  
            padding: 14px;  
            background: var(--black);  
            border: 1px solid var(--deep-blue);  
            color: white;  
            border-radius: 10px;  
            outline: none;  
            font-size: 14px;  
        }

        .input-box input:focus {  
            border-color: var(--accent-blue);  
        }

        .input-box button {  
            padding: 0 25px;  
            background: var(--accent-blue);  
            border: none;  
            color: var(--black);  
            font-weight: bold;  
            border-radius: 10px;  
            cursor: pointer;  
            transition: 0.3s;  
        }

        .input-box button:hover {  
            box-shadow: var(--glow);  
            transform: scale(1.05);  
        }

        /* Scrollbar */  
        ::-webkit-scrollbar { width: 5px; }  
        ::-webkit-scrollbar-track { background: transparent; }  
        ::-webkit-scrollbar-thumb { background: var(--deep-blue); border-radius: 10px; }  
    </style>  
</head>  
<body>

    <nav>  
        <div class="logo">AstralChat</div>  
        <a href="index.html" class="games-btn">Games</a>  
    </nav>

    <!-- AUTH OVERLAY -->  
    <div id="auth-overlay">  
        <div class="auth-card">  
            <h2>Join the Void</h2>  
            <input type="text" id="username" placeholder="Username">  
            <input type="email" id="email" placeholder="Email Address">  
            <button onclick="handleLogin()">Enter AstralChat</button>  
        </div>  
    </div>

    <!-- MAIN APPLICATION -->  
    <div id="main-app" style="display: none;">  
        <div class="sidebar">  
            <div class="user-profile">  
                <div class="user-avatar" id="avatar">U</div>  
                <div class="user-info">  
                    <span id="display-name">Username</span>  
                    <small id="display-email">email@void.com</small>  
                </div>  
            </div>  
            <div style="color: var(--text-gray); font-size: 12px; text-align: center; margin-top: auto;">  
                Connected to Astral Network v2.0  
            </div>  
        </div>

        <div class="chat-area">  
            <div id="message-list">  
                <!-- Messages appear here -->  
                <div class="message msg-received">  
                    <span class="msg-user">System</span>  
                    Welcome to the Void. Your connection is secure.  
                </div>  
            </div>  
            <div class="input-box">  
                <input type="text" id="chat-input" placeholder="Type a message to the void...">  
                <button onclick="sendMsg()">Send</button>  
            </div>  
        </div>  
    </div>

    <!-- P2P Network Logic -->  
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>  
    <script>  
        let peer = null;  
        let connections = [];  
        let myName = "";

        function handleLogin() {  
            const user = document.getElementById('username').value;  
            const email = document.getElementById('email').value;

            if (user && email) {  
                myName = user;  
                document.getElementById('display-name').innerText = user;  
                document.getElementById('display-email').innerText = email;  
                document.getElementById('avatar').innerText = user.charAt(0).toUpperCase();  
                  
                document.getElementById('auth-overlay').style.display = 'none';  
                document.getElementById('main-app').style.display = 'grid';  
                  
                initNetwork();  
            } else {  
                alert("Fill in all details, dumbass!");  
            }  
        }

        function initNetwork() {  
            // Initialize PeerJS for real cross-device P2P communication  
            peer = new Peer();

            peer.on('open', (id) => {  
                console.log('My Peer ID: ' + id);  
                // In a real app, you'd save this ID to a database so others can find you  
                // For this demo, we'll simulate an automatic connection to a public room  
            });

            peer.on('connection', (conn) => {  
                setupConnection(conn);  
            });  
        }

        function setupConnection(conn) {  
            connections.push(conn);  
            conn.on('data', (data) => {  
                appendMessage(data.user, data.text, 'received');  
            });  
        }

        function sendMsg() {  
            const input = document.getElementById('chat-input');  
            const text = input.value;

            if (text.trim() !== "") {  
                appendMessage('Me', text, 'sent');  
                  
                // Send to all connected peers  
                connections.forEach(conn => {  
                    conn.send({  
                        user: myName,  
                        text: text  
                    });  
                });  
                input.value = "";  
            }  
        }

        function appendMessage(user, text, type) {  
            const list = document.getElementById('message-list');  
            const msgDiv = document.createElement('div');  
            msgDiv.className = `message msg-${type}`;  
            msgDiv.innerHTML = `<span class="msg-user">${user}</span>${text}`;  
            list.appendChild(msgDiv);  
            list.scrollTop = list.scrollHeight;  
        }

        // Enter key support  
        document.getElementById('chat-input').addEventListener('keypress', (e) => {  
            if (e.key === 'Enter') sendMsg();  
        });  
    </script>  
</body>  
</html>

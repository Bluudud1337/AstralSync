<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstralChat</title>
    <link rel="icon" type="image/png" href="https://academic-mathwork.vercel.app/icon-512.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --black: #020205;
            --dark-bg: #080812;
            --accent-blue: #6d5cf9;
            --deep-blue: #1606d5;
            --text-gray: #39027c;
            --glass: rgba(255, 255, 255, 0.05);
            --glow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--black);
            color: white;
            overflow: hidden;
        }

        nav {
            height: 60px;
            background: var(--dark-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid var(--deep-blue);
            box-sizing: border-box;
            z-index: 1000;
            position: relative;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: var(--glow);
        }

        .games-btn {
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 8px 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .games-btn:hover {
            background: var(--accent-blue);
            color: var(--black);
            box-shadow: var(--glow);
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a20 0%, #020205 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .auth-card {
            background: var(--dark-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--deep-blue);
            width: 350px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), var(--glow);
        }

        .auth-card h2 {
            margin-top: 0;
            font-size: 28px;
            color: var(--accent-blue);
            margin-bottom: 25px;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--black);
            border: 1px solid var(--deep-blue);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        .auth-card input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 5px var(--accent-blue);
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: var(--accent-blue);
            border: none;
            color: var(--black);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .auth-card button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        #main-app {
            display: none;
            height: calc(100vh - 60px);
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: var(--dark-bg);
            border-right: 1px solid var(--deep-blue);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: var(--glass);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--black);
            font-weight: bold;
        }

        .user-info span {
            display: block;
            font-size: 14px;
            font-weight: bold;
        }

        .user-info small {
            color: var(--text-gray);
            font-size: 11px;
        }

        .server-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .server-btn {
            background: var(--glass);
            border: 1px solid var(--deep-blue);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-weight: bold;
        }

        .server-btn.active {
            border-color: var(--accent-blue);
            background: rgba(0, 212, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        #message-list {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .message {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            animation: slideIn 0.3s ease-out;
            max-width: 60%;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .msg-received {
            background: var(--glass);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-top-left-radius: 4px;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border: 1px solid var(--deep-blue);
            margin-right: auto;
        }

        .msg-sent {
            background: linear-gradient(135deg, var(--accent-blue), var(--deep-blue));
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border-top-right-radius: 4px;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
            margin-left: auto;
        }

        .msg-user {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .msg-time {
            display: block;
            font-size: 9px;
            color: var(--text-gray);
            text-align: right;
            margin-top: 5px;
        }

        .input-box {
            padding: 20px;
            background: var(--dark-bg);
            display: flex;
            gap: 15px;
            border-top: 1px solid var(--deep-blue);
            flex-shrink: 0;
        }

        .input-box input {
            flex: 1;
            padding: 14px;
            background: var(--black);
            border: 1px solid var(--deep-blue);
            color: white;
            border-radius: 10px;
            outline: none;
        }

        .input-box input:focus {
            border-color: var(--accent-blue);
        }

        .input-box button {
            padding: 0 25px;
            background: var(--accent-blue);
            border: none;
            color: var(--black);
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        .input-box button:hover {
            box-shadow: var(--glow);
            transform: scale(1.05);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--deep-blue);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">AstralChat</div>
        <a href="index.html" class="games-btn">Games</a>
    </nav>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Join the Void</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="email" id="email" placeholder="Email Address">
            <button onclick="handleLogin()">Enter AstralChat</button>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <div class="user-profile">
                <div class="user-avatar" id="avatar">U</div>
                <div class="user-info">
                    <span id="display-name">Username</span>
                    <small id="display-email">email@void.com</small>
                </div>
            </div>
            <div style="font-size: 12px; color: var(--text-gray); margin-bottom: 10px; letter-spacing: 1px;">SERVERS</div>
            <div class="server-list">
                <button class="server-btn active" id="btn-global" onclick="switchServer('global')">🌐 Global</button>
                <button class="server-btn" id="btn-school" onclick="switchServer('school')">🏫 School</button>
            </div>
            <button onclick="logout()" style="margin-top:auto; background:none; border:none; color:red; cursor:pointer; font-size:12px;">Logout / Clear Account</button>
        </div>

        <div class="chat-area">
            <div id="message-list"></div>
            <div class="input-box">
                <input type="text" id="chat-input" placeholder="Sending to Global...">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>
    <script type="module">
        import {
            initializeApp
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getDatabase,
            ref,
            push,
            onChildAdded,
            off
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDlGnuWIAZW9afM4fvmk4IH6vC-1brdzjo",
            authDomain: "astralchat-c70f0.firebaseapp.com",
            databaseURL: "https://astralchat-c70f0-default-rtdb.firebaseio.com",
            projectId: "astralchat-c70f0",
            storageBucket: "astralchat-c70f0.firebasestorage.app",
            messagingSenderId: "165354742069",
            appId: "1:165354742069:web:cad1d172f5c524046f6c7c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // MAKE THESE GLOBAL
        window.db = db;
        window.ref = ref;
        window.push = push;
        window.onChildAdded = onChildAdded;
        window.off = off;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        const bannedWords = [
            "fuck", "shit", "bitch", "asshole", "dumbass"
        ];
        // Persistent memory system  
        let myName = "";
        let myEmail = "";
        let currentServer = "global";
        let peer = null;
        let connections = [];

        // Check if user is already remembered  
        window.onload = () => {
            const savedUser = localStorage.getItem('astral_user');
            const savedEmail = localStorage.getItem('astral_email');
            if (savedUser && savedEmail) {
                autoLogin(savedUser, savedEmail);
            }
        };

        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();

            if (user && email) {
                localStorage.setItem('astral_user', user);
                localStorage.setItem('astral_email', email);
                autoLogin(user, email);
            } else {
                alert("Fill it in, dumbass!");
            }
        }

        function autoLogin(user, email) {
            myName = user;
            myEmail = email;
            document.getElementById('display-name').innerText = user;
            document.getElementById('display-email').innerText = email;
            document.getElementById('avatar').innerText = user.charAt(0).toUpperCase();

            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';

            switchServer('global');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function initNetwork() {
            // Initialize PeerJS  
            peer = new Peer();

            peer.on('open', (id) => {
                console.log('My Peer ID:', id);
                // In a real app, you'd broadcast this ID to find other peers  
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    connections.push(conn);
                });

                conn.on('data', (data) => {
                    if (data.server === currentServer) {
                        appendMessage(data.user, data.text, data.time, 'received');
                    }
                });

                conn.on('close', () => {
                    connections = connections.filter(c => c !== conn);
                });
            });

            // Simulate connecting to a public peer (for demo purposes)  
            const simulatedPeerId = 'astralchat-demo-peer';
            const conn = peer.connect(simulatedPeerId);
            conn.on('open', () => {
                connections.push(conn);
            });
        }

        function containsBadWord(text) {
            const lower = text.toLowerCase();
            return bannedWords.some(word => lower.includes(word));
        }

        function switchServer(server) {
            if (server === 'school') {
                if (!myEmail.endsWith('@amanicharter.org')) {
                    alert("Access Denied. Only @amanicharter.org emails can enter the School server.");
                    return;
                }
            }

            currentServer = server;
            document.getElementById('btn-global').classList.toggle('active', server === 'global');
            document.getElementById('btn-school').classList.toggle('active', server === 'school');
            document.getElementById('chat-input').placeholder = `Sending to ${server}...`;

            // Clear messages and load from localStorage for this server  
            loadMessages();
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();

            if (!text) return;

            // 🚫 Filter only in school server
            if (currentServer === "school" && containsBadWord(text)) {
                alert("Keep it clean. No swearing in the school server.");
                return;
            }

            const now = new Date();
            const timeString = now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            window.push(window.ref(window.db, "messages/" + currentServer), {
                user: myName,
                text: text,
                time: timeString
            });

            input.value = "";
            input.focus();
        }

        let currentListener = null;

        function loadMessages() {
            const list = document.getElementById('message-list');
            list.innerHTML = "";

            if (currentListener) {
                off(currentListener);
            }

            const messagesRef = window.ref(window.db, "messages/" + currentServer);

            currentListener = messagesRef;

            onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const type = msg.user === myName ? 'sent' : 'received';

                appendMessage(msg.user, msg.text, msg.time, type);
            });
        }

        function appendMessage(user, text, time, type) {
            const list = document.getElementById('message-list');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${type}`;
            msgDiv.innerHTML = `  
<span class="msg-user">${user}</span>  
${text}  
<span class="msg-time">${time}</span>  
`;
            list.appendChild(msgDiv);
            list.scrollTop = list.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AstralChat V2</title>

<style>
:root{
  --bg:#020205;
  --panel:#080812;
  --accent:#6d5cf9;
  --deep:#1606d5;
  --text:#c9c9ff;
  --glass:rgba(255,255,255,0.05);
}

*{box-sizing:border-box;font-family:Arial;}
body{margin:0;background:var(--bg);color:white;overflow:hidden;}

nav{
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:var(--panel);
  border-bottom:1px solid var(--deep);
}

.logo{color:var(--accent);font-weight:bold;}

#banner{
  position:fixed;
  top:60px;
  left:0;
  width:100%;
  background:linear-gradient(90deg,var(--accent),var(--deep));
  padding:8px;
  text-align:center;
  display:none;
  z-index:999;
}

#app{
  display:grid;
  grid-template-columns:260px 1fr;
  height:calc(100vh - 60px);
}

.sidebar{
  background:var(--panel);
  padding:10px;
  display:flex;
  flex-direction:column;
}

.userbox{padding:10px;background:var(--glass);border-radius:10px;margin-bottom:10px;}

.server{padding:10px;margin:5px 0;background:var(--glass);cursor:pointer;border-radius:8px;}
.server.active{outline:1px solid var(--accent);}

#chat{
  display:flex;
  flex-direction:column;
  height:100%;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:60%;
  padding:10px;
  border-radius:10px;
  background:var(--glass);
}

.me{align-self:flex-end;background:var(--deep);}

#inputBar{
  display:flex;
  padding:10px;
  background:var(--panel);
}

#inputBar input{
  flex:1;
  padding:10px;
  background:black;
  border:1px solid var(--deep);
  color:white;
}

button{padding:10px;background:var(--accent);border:none;cursor:pointer;}

#typing,#online{font-size:12px;color:gray;padding:5px;}

</style>
</head>
<body>

<nav>
<div class="logo">AstralChat V2</div>
</nav>

<div id="banner"></div>

<div id="app">

<div class="sidebar">

<div class="userbox">
<div id="name">Guest</div>
<div id="role">user</div>
</div>

<div class="server active" onclick="setServer('global')">🌐 Global</div>
<div class="server" onclick="setServer('school')">🏫 School</div>

<div id="online"></div>

<button onclick="logout()">Logout</button>
</div>

<div id="chat">
<div id="messages"></div>
<div id="typing"></div>

<div id="inputBar">
<input id="msg" placeholder="type..." />
<button onclick="send()">Send</button>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, set, onChildAdded, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
databaseURL:"YOUR_DB"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user = localStorage.getItem("u") || prompt("name?");
localStorage.setItem("u",user);

let server="global";
let typingRef;

const isAdmin = user.includes("admin");

window.name = user;

document.getElementById("name").innerText=user;
document.getElementById("role").innerText=isAdmin?"admin":"user";

// ANNOUNCEMENTS
const banner=document.getElementById("banner");
onValue(ref(db,"announce"),(s)=>{
const v=s.val();
if(v){banner.style.display="block";banner.innerText="📢 "+v.text;}
});

window.setServer=(s)=>{
server=s;
load();
}

function load(){

document.getElementById("messages").innerHTML="";

onChildAdded(ref(db,"msg/"+server),(snap)=>{
const m=snap.val();
const div=document.createElement("div");
div.className="msg"+(m.user===user?" me":"");
div.innerHTML=`<b>${m.user}</b><br>${m.text}`;

if(isAdmin){
const d=document.createElement("button");
d.innerText="x";
d.onclick=()=>remove(ref(db,"msg/"+server+"/"+snap.key));
div.appendChild(d);
}

document.getElementById("messages").appendChild(div);
});

// online
onValue(ref(db,"online"),(s)=>{
const v=s.val()||{};
document.getElementById("online").innerText="🟢 "+Object.keys(v).join(", ");
});

// typing
onValue(ref(db,"typing/"+server),(s)=>{
const v=s.val()||{};
const t=Object.keys(v).filter(x=>x!==user);
document.getElementById("typing").innerText=t.length?t+" typing...":"";
});

set(ref(db,"online/"+user),true);
}

window.send=()=>{
const text=document.getElementById("msg").value;
if(!text)return;
push(ref(db,"msg/"+server),{user,text});
document.getElementById("msg").value="";
};

// typing
c
